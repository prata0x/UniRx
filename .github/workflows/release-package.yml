name: Release Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach UniRx.unitypackage to
        required: true

permissions:
  contents: write

jobs:
  package:
    name: Export and upload UniRx.unitypackage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: game-ci/unity-builder@d829bfc901f2347c8fe18898f06712b66916ef42 # v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2019.4.41f2
          targetPlatform: StandaloneLinux64
          buildMethod: PackageExporter.Export
          customParameters: -ScriptBackend Mono2x -Headless -BuildTarget StandaloneLinux64
          runAsHostUser: true

      - name: Upload UniRx.unitypackage to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name || inputs.tag }}" UniRx.unitypackage --clobber
